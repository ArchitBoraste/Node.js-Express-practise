<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./CSS/login.css">
</head>
<body>

    <nav style="position: absolute; top: 30px; text-align: center; width: 100%;">
        <a href="/" style="color: #6b7280; text-decoration: none; font-family: sans-serif; font-weight: 600; margin: 0 15px;">Home</a>
        <a href="/about" style="color: #6b7280; text-decoration: none; font-family: sans-serif; font-weight: 600; margin: 0 15px;">About</a>
    </nav>

    <form action="/submit" method="post">
        <h2 style="text-align: center; margin-bottom: 24px; font-weight: 600;">Account Login</h2>
        
        <input type="text" name="username" placeholder="Enter your name" required />
        
        <input type="password" name="password" placeholder="Enter your password" required />
        
        <button type="submit">Login</button>
    </form> 

</body>
</html>
